openapi: 3.0.3

info:
  title: Translation Management Service
  description: API for managing multi-locale translations with tagging, search, and JSON export.
  version: 1.0.0

servers:
  - url: http://localhost:8000/api
    description: Local development

security:
  - bearerAuth: []

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    Translation:
      type: object
      properties:
        id:
          type: integer
        locale:
          type: object
          properties:
            id: { type: integer }
            code: { type: string, example: en }
            name: { type: string, example: English }
        key:
          type: string
          example: auth.login
        value:
          type: string
          example: Login
        group:
          type: string
          example: auth
        tags:
          type: array
          items: { type: string }
          example: [mobile, web]
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    Locale:
      type: object
      properties:
        id: { type: integer }
        code: { type: string, example: en }
        name: { type: string, example: English }
        is_active: { type: boolean }

    ValidationError:
      type: object
      properties:
        message: { type: string }
        errors:
          type: object
          additionalProperties:
            type: array
            items: { type: string }

    PaginatedTranslations:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Translation'
        links:
          type: object
        meta:
          type: object
          properties:
            current_page: { type: integer }
            last_page: { type: integer }
            per_page: { type: integer }
            total: { type: integer }

paths:
  /auth/register:
    post:
      tags: [Auth]
      summary: Register a new user
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, email, password, password_confirmation]
              properties:
                name: { type: string }
                email: { type: string, format: email }
                password: { type: string, minLength: 8 }
                password_confirmation: { type: string }
      responses:
        '201':
          description: Registered
          content:
            application/json:
              schema:
                type: object
                properties:
                  token: { type: string }
                  user:
                    type: object
                    properties:
                      id: { type: integer }
                      name: { type: string }
                      email: { type: string }
        '422':
          description: Validation error
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ValidationError' }

  /auth/login:
    post:
      tags: [Auth]
      summary: Login and receive a token
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email: { type: string, format: email }
                password: { type: string }
      responses:
        '200':
          description: Authenticated
          content:
            application/json:
              schema:
                type: object
                properties:
                  token: { type: string }
                  user: { type: object }
        '422':
          description: Invalid credentials

  /auth/logout:
    post:
      tags: [Auth]
      summary: Revoke the current token
      responses:
        '200':
          description: Logged out

  /auth/me:
    get:
      tags: [Auth]
      summary: Get the authenticated user
      responses:
        '200':
          description: Current user

  /translations:
    get:
      tags: [Translations]
      summary: List translations
      parameters:
        - in: query
          name: locale
          schema: { type: string }
          description: Filter by locale code
        - in: query
          name: tag
          schema: { type: string }
          description: Filter by tag name
        - in: query
          name: search
          schema: { type: string }
          description: Search by key or value
        - in: query
          name: key
          schema: { type: string }
          description: Exact key match
        - in: query
          name: group
          schema: { type: string }
          description: Filter by group
        - in: query
          name: per_page
          schema: { type: integer, default: 20, maximum: 100 }
      responses:
        '200':
          description: Paginated translations
          content:
            application/json:
              schema: { $ref: '#/components/schemas/PaginatedTranslations' }

    post:
      tags: [Translations]
      summary: Create a translation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [locale, key, value]
              properties:
                locale: { type: string, example: en }
                key: { type: string, example: auth.login }
                value: { type: string, example: Login }
                group: { type: string, example: auth }
                tags:
                  type: array
                  items: { type: string }
                  example: [mobile, web]
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/Translation' }
        '422':
          description: Validation error

  /translations/{id}:
    parameters:
      - in: path
        name: id
        required: true
        schema: { type: integer }

    get:
      tags: [Translations]
      summary: Get a translation
      responses:
        '200':
          description: Translation
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/Translation' }
        '404':
          description: Not found

    put:
      tags: [Translations]
      summary: Update a translation
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                locale: { type: string }
                key: { type: string }
                value: { type: string }
                group: { type: string }
                tags:
                  type: array
                  items: { type: string }
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/Translation' }

    delete:
      tags: [Translations]
      summary: Delete a translation
      responses:
        '200':
          description: Deleted

  /export/{locale}:
    get:
      tags: [Export]
      summary: Export all translations for a locale
      security: []
      parameters:
        - in: path
          name: locale
          required: true
          schema: { type: string }
          example: en
      responses:
        '200':
          description: Grouped translations for the locale
          content:
            application/json:
              schema:
                type: object
                properties:
                  locale:
                    type: string
                    example: en
                  data:
                    type: object
                    description: Keys grouped by translation group
                    example:
                      auth:
                        login: Login
                        logout: Logout
                      general:
                        welcome: Welcome
        '404':
          description: Locale not found

  /locales:
    get:
      tags: [Locales]
      summary: List active locales
      responses:
        '200':
          description: List of locales
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/Locale' }

    post:
      tags: [Locales]
      summary: Add a new locale
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [code, name]
              properties:
                code: { type: string, example: de }
                name: { type: string, example: German }
      responses:
        '201':
          description: Locale created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Locale' }

  /locales/{id}:
    delete:
      tags: [Locales]
      summary: Deactivate a locale
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        '200':
          description: Deactivated
